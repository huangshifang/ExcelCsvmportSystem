# ============================================
# Excel Import System — Docker Compose
# ============================================
# Usage:
#   1. cp .env.docker .env   (edit if needed)
#   2. docker compose up -d
#   3. Open http://localhost
#   4. Login: admin / admin123
# ============================================

services:
  # ===== ASP.NET Core API =====
  api:
    build:
      context: ./src
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=host.docker.internal;Database=ExcelImportDb;User ID=excel_user;Password=sh.12345;TrustServerCertificate=True;MultipleActiveResultSets=true
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=ExcelImportSystem
      - Jwt__Audience=ExcelImportSystem
      - Jwt__ExpireHours=24
      - Ldap__Enabled=${LDAP_ENABLED:-false}
    ports:
      - "5001:5000"
    networks:
      - app-network

  # ===== React Frontend (Nginx + HTTPS) =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./offline-deploy/nginx-https.conf:/etc/nginx/conf.d/default.conf:ro
      - ./offline-deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
