# ============================================
# Excel Import System — Docker Compose
# ============================================
# Usage:
#   1. cp .env.docker .env   (edit if needed)
#   2. docker-compose up -d
#   3. Open http://localhost
#   4. Login: admin / admin123
# ============================================

services:
  # ===== SQL Server =====
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${SA_PASSWORD}" -Q "SELECT 1" -C
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network

  # ===== ASP.NET Core API =====
  api:
    build:
      context: ./src
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Server=db;Database=ExcelImportDb;User ID=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=ExcelImportSystem
      - Jwt__Audience=ExcelImportSystem
      - Jwt__ExpireHours=24
      - Ldap__Enabled=${LDAP_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  # ===== React Frontend (Nginx) =====
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app-network

volumes:
  sqldata:
    driver: local

networks:
  app-network:
    driver: bridge
